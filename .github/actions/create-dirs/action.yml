name: '[ACTION] Create Directories'
description: '根据日期创建目录，支持自动获取当前日期'

inputs:
  date:
    description: '日期格式 YYYY-MM-DD，留空则使用当前北京时间'
    required: false

runs:
  using: 'composite'
  steps:
    - name: "[STEP] Run Worker via Bash"
      shell: bash
      run: bash "${{ github.action_path }}/worker.bash" "${{ inputs.date }}"
    
    - name: "[STEP] Print Summary via Action"
      uses: ./.github/actions/bot-summary
      with:
        title: "Create Directories"
        message: "BasePath is ${{ env.BASE_PATH }}"