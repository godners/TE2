name: "[ACTION] Adjust Opened"
# .github/actions/adjust-opened/action.yml

description: '校验并格式化调节数据中的日期'

inputs:
  input_date:
    description: '原始日期输入'
    required: false
  is_today:
    description: '是否勾选今日'
    required: false

outputs:
  date:
    description: '处理后的日期'
    value: ${{ steps.worker.outputs.date }}

runs:
  using: composite
  steps: 
    - name: "[STEP] Run Worker via Bash"
      id: worker
      shell: bash
      env:
        INPUT_DATE: ${{ inputs.input_date }}
        IS_TODAY: ${{ inputs.is_today }}
      run: bash ${{ github.action_path }}/worker.bash